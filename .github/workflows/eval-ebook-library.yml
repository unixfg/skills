name: Eval ebook-library

on:
  workflow_run:
    workflows:
      - Publish ebook-library
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or SHA to evaluate
        required: false
        default: main
      agent:
        description: Optional Tessl agent override
        required: false
        default: "claude:claude-haiku-4-5"
      force:
        description: Re-run all scenarios even if they were already solved
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ebook-library-eval-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}
  cancel-in-progress: false

jobs:
  eval:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      TESSL_API_TOKEN: ${{ secrets.TESSL_API_TOKEN }}
      TESSL_WORKSPACE: jobe-skills
      DEFAULT_EVAL_AGENT: claude:claude-haiku-4-5
    steps:
      - name: Resolve ref and options
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            eval_ref="${{ github.event.workflow_run.head_sha }}"
            source_ref="${{ github.event.workflow_run.head_branch }}"
            force="true"
            agent="${DEFAULT_EVAL_AGENT}"
          else
            eval_ref="${{ inputs.ref }}"
            source_ref="${{ inputs.ref }}"
            force="${{ inputs.force }}"
            agent="${{ inputs.agent }}"
            if [[ -z "$agent" ]]; then
              agent="${DEFAULT_EVAL_AGENT}"
            fi
          fi

          echo "eval_ref=$eval_ref" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"
          echo "agent=$agent" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.eval_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tile evals
        id: run_evals
        shell: bash
        env:
          EVAL_AGENT: ${{ steps.meta.outputs.agent }}
          EVAL_FORCE: ${{ steps.meta.outputs.force }}
        run: |
          set -euo pipefail

          cmd=(npx --yes tessl@latest eval run)
          if [[ -n "$EVAL_AGENT" ]]; then
            cmd+=(--agent "$EVAL_AGENT")
          fi
          cmd+=(--workspace "$TESSL_WORKSPACE")
          if [[ "$EVAL_FORCE" == "true" ]]; then
            cmd+=(--force)
          fi
          cmd+=(./ebook-library)

          printf 'Running command:'
          printf ' %q' "${cmd[@]}"
          printf '\n'

          "${cmd[@]}" | tee /tmp/ebook-library-eval-run.log

          run_url="$(grep -Eo 'https://tessl\.io/eval-runs/[0-9a-f-]+' /tmp/ebook-library-eval-run.log | tail -n1 || true)"
          run_id=""
          if [[ -n "$run_url" ]]; then
            run_id="${run_url##*/}"
          fi

          echo "run_url=$run_url" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Show eval details
        if: ${{ steps.run_evals.outputs.run_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npx --yes tessl@latest eval view "${{ steps.run_evals.outputs.run_id }}"

      - name: Publish summary
        if: always()
        shell: bash
        env:
          SOURCE_REF: ${{ steps.meta.outputs.source_ref }}
          EVAL_REF: ${{ steps.meta.outputs.eval_ref }}
          EVAL_AGENT: ${{ steps.meta.outputs.agent }}
          EVAL_FORCE: ${{ steps.meta.outputs.force }}
          RUN_URL: ${{ steps.run_evals.outputs.run_url }}
        run: |
          set -euo pipefail

          {
            echo "### ebook-library eval"
            echo
            echo "- Source ref: \`$SOURCE_REF\`"
            echo "- Evaluated commit: \`$EVAL_REF\`"
            echo "- Agent: \`$EVAL_AGENT\`"
            echo "- Forced rerun: \`$EVAL_FORCE\`"
            if [[ -n "$RUN_URL" ]]; then
              echo "- Eval run: $RUN_URL"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
