name: Publish prometheus-oidc-query

permissions:
  id-token: write
  contents: read

on:
  push:
    # Publish only from explicit release tags for this tile.
    tags:
      - "tessl-prometheus-oidc-query-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: tesslio/publish@main
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}
          path: "./prometheus-oidc-query"
